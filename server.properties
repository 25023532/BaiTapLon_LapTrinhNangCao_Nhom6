# ============================================================
# Cấu hình kết nối AuctionServer
# ============================================================
#
# ── CHẾ ĐỘ CLOUD (khác mạng) ─────────────────────────────
# Dùng server.url khi server deploy lên Railway / Render / VPS
# Bỏ comment dòng dưới và điền URL thật:
#
# server.url=wss://your-app-name.up.railway.app
#
# ── CHẾ ĐỘ LOCAL / LAN (cùng mạng) ──────────────────────
# Dùng server.host + server.port khi chạy trên cùng mạng WiFi
#
server.host=localhost
server.port=1234
#
# ── HƯỚNG DẪN ────────────────────────────────────────────
# 1. Deploy lên Railway (miễn phí):
#    - Tạo project Railway, chọn "Deploy from GitHub"
#    - Railway tự build và cấp URL: wss://xyz.up.railway.app
#    - Điền vào: server.url=wss://xyz.up.railway.app
#
# 2. Dùng ngrok (nhanh, không cần deploy):
#    - Chạy server local: java -jar auction-server.jar 1234
#    - Chạy ngrok: ngrok tcp 1234
#    - Ngrok cấp: tcp://0.tcp.ngrok.io:PORT
#    - Điền: server.host=0.tcp.ngrok.io  server.port=PORT
#
# 3. Cùng mạng LAN (WiFi):
#    - Tìm IP máy chạy server (ipconfig / ifconfig)
#    - Điền: server.host=192.168.x.x
# ============================================================
