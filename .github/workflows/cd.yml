name: CD — Deploy Server

on:
  push:
    branches: [ main ]
    tags:     [ "v*.*.*" ]
  workflow_dispatch:       # cho phép chạy thủ công từ GitHub UI

env:
  SERVER_JAR: AuctionSystem_Nhom6-1.0-SNAPSHOT-server.jar

jobs:
  # ── Job 1: Build fat JAR ────────────────────────────────────────────────
  build:
    name: Build Server JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build fat JAR (skip tests — đã chạy ở CI)
        run: mvn clean package -DskipTests -B

      - name: Upload server JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: target/${{ env.SERVER_JAR }}
          retention-days: 30

  # ── Job 2: Deploy lên server (SSH) ─────────────────────────────────────
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download server JAR
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: ./deploy

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Dừng server cũ nếu đang chạy
            pkill -f "${{ env.SERVER_JAR }}" || true
            sleep 2

            # Backup bản cũ
            mkdir -p ~/auction-server/backup
            mv ~/auction-server/${{ env.SERVER_JAR }} \
               ~/auction-server/backup/${{ env.SERVER_JAR }}.$(date +%Y%m%d_%H%M%S) \
               2>/dev/null || true

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          source:   "deploy/${{ env.SERVER_JAR }}"
          target:   "~/auction-server/"
          strip_components: 1

      - name: Start server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ~/auction-server
            nohup java -jar ${{ env.SERVER_JAR }} \
              > logs/server-$(date +%Y%m%d_%H%M%S).log 2>&1 &
            echo "Server started with PID $!"

  # ── Job 3: Create GitHub Release (chỉ khi push tag) ───────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download server JAR
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ env.SERVER_JAR }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
