name: Java CI with Maven
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
      # 2. Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      # 3. Build + chạy tất cả unit test
      - name: Build and Test
        run: mvn clean verify
      # 4. Checkstyle — enforce Google Java Style
      - name: Checkstyle
        run: mvn checkstyle:check
      # 5. Upload test report nếu fail
      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
